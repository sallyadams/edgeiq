kind = "web"
previewPath = "/"
title = "EdgeIQ — Market Intelligence"
version = "1.0.0"
id = "artifacts/edgeiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23411
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/edgeiq run dev"

[services.env]
PORT = "23411"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/edgeiq", "run", "build"]
publicDir = "artifacts/edgeiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
